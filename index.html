<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Real-Time Мессенджер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        #login { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; z-index: 100; }
        #login h2 { margin-bottom: 20px; color: #333; }
        #login input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        #login button { width: 100%; max-width: 300px; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        #error { color: red; font-size: 14px; margin-top: 10px; display: none; }
        #chat { display: none; height: 100vh; flex-direction: column; }
        .header { background: #0088cc; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .logout { background: none; border: none; color: white; font-size: 14px; text-decoration: underline; cursor: pointer; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; display: none; }
        .sidebar.show { display: block; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .chat-item.active { background: #e3f2fd; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-header { padding: 12px 15px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #666; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; word-wrap: break-word; }
        .msg.received { align-self: flex-start; background: white; border-bottom-left-radius: 5px; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 5px; }
        .sender-name { font-size: 11px; color: #0088cc; font-weight: bold; margin-bottom: 3px; }
        .time { font-size: 11px; color: #999; text-align: right; margin-top: 4px; }
        .input { padding: 10px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; }
        .input input { flex: 1; padding: 12px 15px; border: none; border-radius: 25px; font-size: 15px; outline: none; }
        .input button { width: 45px; height: 45px; border-radius: 50%; background: #0088cc; color: white; border: none; font-size: 18px; cursor: pointer; }
        .menu-btn { display: block; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; }
        @media (min-width: 768px) { .sidebar { display: block !important; } .menu-btn { display: none; } }
        .hidden { display: none !important; }
        .flex { display: flex !important; }
    </style>
</head>
<body>
    <div id="login">
        <h2>💬 Real-Time Чат</h2>
        <input type="text" id="name" placeholder="Ваше имя" autocomplete="off">
        <button onclick="enter()">Войти</button>
        <p id="error">⚠️ Введите имя</p>
    </div>

    <div id="chat" class="flex">
        <div class="header">            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span id="myName">Гость</span>
            <button class="logout" onclick="exit()">Выйти</button>
        </div>
        <div class="container">
            <div class="sidebar" id="sidebar">
                <div class="chat-item active" onclick="pickChat('Общий чат', '#0088cc')">
                    <b>💬 Общий чат</b><br><small>Все пользователи</small>
                </div>
            </div>
            <div class="chat-window">
                <div class="chat-header">
                    <div class="avatar" id="chatAvatar" style="background:#0088cc">💬</div>
                    <div><b id="chatName">Общий чат</b><br><small style="color:green">● онлайн</small></div>
                </div>
                <div class="messages" id="box"></div>
                <div class="input">
                    <input type="text" id="txt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
                    <button onclick="send()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // =======================================================
        // 👇👇👇 ВОТ СЮДА ВСТАВЛЯЙ СВОЙ КОД ИЗ FIREBASE 👇👇👇
        // Замени всё внутри фигурных скобок { ... } на свой код
        // =======================================================
        const firebaseConfig = {
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyADy3ek2ep75Dr7spJHMUFYkhn8-SbO1Z0",
  authDomain: "dersqwen-c4b28.firebaseapp.com",
  projectId: "dersqwen-c4b28",
  storageBucket: "dersqwen-c4b28.firebasestorage.app",
  messagingSenderId: "164649579109",
  appId: "1:164649579109:web:2f576da105a319400f8c8c",
  measurementId: "G-RL3X3FXX75"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        };
        // =======================================================
        // 👆👆👆 КОНЕЦ ВСТАВКИ 👆👆👆
        // =======================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const messagesRef = db.ref('messages');
        let currentUser = '';
        let currentChat = 'Общий чат';
        function enter() {
            const name = document.getElementById('name').value.trim();
            if (name) {
                currentUser = name;
                document.getElementById('myName').textContent = name;
                document.getElementById('login').classList.add('hidden');
                document.getElementById('chat').classList.remove('hidden');
                document.getElementById('chat').classList.add('flex');
                loadMessages();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
        function exit() { location.reload(); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('show'); }
        function pickChat(name, color) {
            currentChat = name;
            document.getElementById('chatName').textContent = name;
            document.getElementById('chatAvatar').textContent = name[0];
            document.getElementById('chatAvatar').style.background = color;
            document.getElementById('box').innerHTML = '';
            loadMessages();
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('show');
        }
        function send() {
            const input = document.getElementById('txt');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            messagesRef.push({ chat: currentChat, user: currentUser, text: text, time: new Date().toISOString() });
            input.value = '';
        }
        function loadMessages() {
            messagesRef.orderByChild('time').on('value', (snapshot) => {
                const box = document.getElementById('box');
                box.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    if (msg.chat === currentChat) {
                        const time = new Date(msg.time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
                        const type = msg.user === currentUser ? 'sent' : 'received';
                        const div = document.createElement('div');
                        div.className = 'msg ' + type;
                        div.innerHTML = `${type === 'received' ? '<div class="sender-name">' + msg.user + '</div>' : ''}${msg.text}<div class="time">${time}</div>`;
                        box.appendChild(div);
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }        document.getElementById('name').onkeypress = function(e) { if (e.key === 'Enter') enter(); }
    </script>
</body>
</html>
